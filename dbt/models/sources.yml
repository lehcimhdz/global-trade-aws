version: 2

sources:
  - name: bronze
    description: >
      Apache Iceberg tables written by the Comtrade Airflow pipeline.
      Each table corresponds to one API endpoint; data files live in
      s3://<bucket>/iceberg/<endpoint>/ and metadata is registered in
      the AWS Glue Data Catalog under the "comtrade" database.
    database: comtrade
    schema: comtrade

    # ── Source freshness ──────────────────────────────────────────────────────
    # The Iceberg writer stamps every record with a UTC timestamp in _loaded_at.
    # dbt source freshness uses this column to verify that each bronze table was
    # refreshed within the expected window after its scheduled ingestion run.
    #
    # All ingestion DAGs run @monthly, so:
    #   warn_after  = 26 days  — slightly past one full monthly cycle
    #   error_after = 35 days  — one month + 5-day grace period
    loaded_at_field: _loaded_at
    freshness:
      warn_after:  {count: 26, period: day}
      error_after: {count: 35, period: day}

    tables:
      - name: preview
        description: >
          Trade flow records from the /preview endpoint. Each row represents
          one commodity-flow-reporter-partner combination for a given period.
        columns:
          - name: reportercode
            description: UN numeric code for the reporting country
            tests:
              - not_null
          - name: partnercode
            description: UN numeric code for the partner country
            tests:
              - not_null
          - name: cmdcode
            description: Commodity code (HS or SITC depending on clCode)
          - name: flowcode
            description: Trade flow direction — M (Import) or X (Export)
            tests:
              - not_null
              - accepted_values:
                  values: ["M", "X", "Re-Import", "Re-Export"]
          - name: primaryvalue
            description: Trade value in USD
          - name: period
            description: Reporting period — YYYY (annual) or YYYYMM (monthly)
            tests:
              - not_null
          - name: _loaded_at
            description: UTC timestamp injected by the Iceberg writer — used for dbt source freshness

      - name: previewtariffline
        description: >
          Tariff-line level trade data from /previewTariffline. More granular
          than /preview — includes individual tariff line codes.
        columns:
          - name: reportercode
            tests:
              - not_null
          - name: period
            tests:
              - not_null
          - name: _loaded_at
            description: UTC timestamp injected by the Iceberg writer — used for dbt source freshness

      - name: getmbs
        description: >
          Monthly Bulletin of Statistics time-series data from /getMBS.
          Covers broad macroeconomic trade indicators.
        columns:
          - name: period
            tests:
              - not_null
          - name: _loaded_at
            description: UTC timestamp injected by the Iceberg writer — used for dbt source freshness
