[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | build
  | dist
  | tests/\.airflow_home
)/
'''

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["comtrade"]
skip_glob = ["*.egg-info", ".venv/*", "__pycache__/*"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = [
    "^tests/",
    "^dags/",
]

[[tool.mypy.overrides]]
module = ["boto3.*", "botocore.*", "airflow.*", "pandas.*", "pyarrow.*"]
ignore_missing_imports = true
